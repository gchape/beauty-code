spring:
  application:
    name: backend
  profiles:
    default: dev
---
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    aws:
      region:
        static: eu-central-1
      credentials:
        instance-profile: false
      dynamodb:
        table-name: BeautyCode
logging:
  level:
    root: info
---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      dynamodb:
        table-name: ${AWS_DYNAMODB_TABLE_NAME}
logging:
  level:
    root: error