spring:
  application:
    name: backend
springdoc:
  packages-to-scan: ge.beauty_code.backend.controller
  paths-to-match: /*

---

spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    root: debug

---

spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    root: error
    sql: off
