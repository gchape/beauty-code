spring:
  application:
    name: backend
  profiles:
    default: dev

aws:
  dynamo_db:
    table-name: BeautyCode

---
spring:
  config:
    activate:
      on-profile: dev

aws:
  region: eu-central-1

logging:
  level:
    root: info

---
spring:
  config:
    activate:
      on-profile: prod

aws:
  region: ${AWS_REGION}

logging:
  level:
    root: error